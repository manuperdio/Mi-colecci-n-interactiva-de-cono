<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>España: Crónica de Dos Mundos - Quiz Experto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .option-btn:hover { transform: translateY(-2px); transition: all 0.2s; }
        .progress-bar { transition: width 0.4s ease-out; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-2xl w-full glass rounded-3xl shadow-2xl overflow-hidden border border-white">
        <!-- Pantalla de Inicio -->
        <div id="start-screen" class="p-8 text-center">
            <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 mb-4">Crónica de Dos Mundos</h1>
            <p class="text-slate-600 mb-8 leading-relaxed">Desafío de 50 preguntas sobre la historia de España. Copia este código en un archivo .html local para guardarlo permanentemente.</p>
            <button onclick="quiz.start()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-semibold text-lg shadow-lg hover:bg-indigo-700 transition-all w-full md:w-auto">
                Comenzar Desafío
            </button>
        </div>

        <!-- Pantalla de Preguntas -->
        <div id="quiz-screen" class="hidden">
            <div class="bg-slate-800 p-4 flex justify-between items-center text-white">
                <span class="text-sm font-medium opacity-80" id="progress-text">Pregunta 1 de 50</span>
                <span class="text-sm font-bold bg-indigo-500 px-3 py-1 rounded-full" id="score-badge">Aciertos: 0</span>
            </div>
            <div class="h-1.5 w-full bg-slate-200">
                <div id="progress-bar" class="h-full bg-indigo-500 progress-bar" style="width: 0%"></div>
            </div>
            
            <div class="p-8">
                <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-6 min-h-[60px]">Cargando pregunta...</h2>
                <div id="options-container" class="space-y-3"></div>
                
                <div id="feedback" class="mt-6 p-5 rounded-2xl hidden border">
                    <p id="feedback-title" class="font-bold mb-2"></p>
                    <p id="feedback-text" class="text-sm leading-relaxed"></p>
                    <button onclick="quiz.next()" class="mt-4 bg-slate-800 text-white px-6 py-2 rounded-xl text-sm font-medium w-full">
                        Siguiente Pregunta
                    </button>
                </div>
            </div>
        </div>

        <!-- Pantalla de Resultados -->
        <div id="result-screen" class="hidden p-8 text-center">
            <h2 class="text-4xl font-black text-slate-800 mb-2">¡Completado!</h2>
            <div class="text-6xl font-black text-indigo-600 my-8" id="final-score">0/50</div>
            <div id="performance-critique" class="bg-slate-50 p-6 rounded-2xl text-left border border-slate-200 mb-8"></div>
            <button onclick="location.reload()" class="text-indigo-600 font-bold hover:underline">Reiniciar el quiz</button>
        </div>
    </div>

    <script>
        // Array de preguntas (Las mismas 50 del contenido original)
        const questions = [
            { q: "¿Qué evento marca el final de la Prehistoria?", a: ["Invención de la escritura", "Caída de Roma", "Descubrimiento del fuego", "Aparición del hombre"], c: 0, e: "La escritura permite documentar eventos, cerrando la etapa ágrafa de la humanidad." },
            { q: "¿En qué año cayó el Imperio Romano de Occidente?", a: ["395 d.C.", "476 d.C.", "711 d.C.", "1492 d.C."], c: 1, e: "En el 476 d.C., Odoacro depuso al último emperador, Rómulo Augústulo." },
            { q: "¿Qué emperador dividió el Imperio en dos en el 395?", a: ["Julio César", "Augusto", "Teodosio", "Constantino"], c: 2, e: "Teodosio dividió el imperio entre sus hijos Arcadio y Honorio." },
            { q: "¿En qué año entraron suevos, vándalos y alanos en Hispania?", a: ["409 d.C.", "476 d.C.", "507 d.C.", "711 d.C."], c: 0, e: "Estas tribus cruzaron los Pirineos aprovechando la debilidad romana." },
            { q: "¿Cuál era la capital del Reino Visigodo?", a: ["Sevilla", "Córdoba", "Toledo", "Barcelona"], c: 2, e: "Toledo fue el centro político y religioso de la monarquía visigoda." },
            { q: "¿Qué rey visigodo se convirtió al catolicismo?", a: ["Leovigildo", "Recaredo", "Don Rodrigo", "Eurico"], c: 1, e: "Recaredo abandonó el arrianismo en el III Concilio de Toledo (589)." },
            { q: "¿Cómo se llamaba el último rey visigodo derrotado en 711?", a: ["Wamba", "Don Pelayo", "Don Rodrigo", "Egica"], c: 2, e: "Don Rodrigo murió en la batalla de Guadalete contra los musulmanes." },
            { q: "¿Qué nombre dieron los musulmanes a la península?", a: ["Hispania", "Al-Ándalus", "Septimania", "Magreb"], c: 1, e: "Al-Ándalus es el término árabe para el territorio peninsular bajo su mando." },
            { q: "¿Cuál es el libro sagrado del Islam?", a: ["Biblia", "Talmud", "Corán", "Torá"], c: 2, e: "El Corán dicta las leyes y la fe traídas por los conquistadores en el 711." },
            { q: "¿En qué año comenzó la invasión musulmana?", a: ["711", "722", "756", "929"], c: 0, e: "La expedición liderada por Tariq entró en el 711 cruzando el Estrecho." },
            { q: "¿Qué batalla marca el inicio de la Reconquista en 722?", a: ["Guadalete", "Covadonga", "Navas de Tolosa", "Vouillé"], c: 1, e: "Don Pelayo lideró la resistencia astur en las montañas de Covadonga." },
            { q: "¿Quién fue el primer emir independiente de Al-Ándalus?", a: ["Abderramán I", "Abderramán III", "Al-Hakam", "Almanzor"], c: 0, e: "Abderramán I, el último Omeya superviviente, huyó de Damasco y fundó el emirato." },
            { q: "¿En qué ciudad estaba la sede del califato del que dependía Al-Ándalus inicialmente?", a: ["Bagdad", "Damasco", "El Cairo", "Meca"], c: 1, e: "Durante el Emirato Dependiente, las órdenes venían del Califato Omeya de Damasco." },
            { q: "¿Qué año marcó el inicio del Califato de Córdoba?", a: ["756", "929", "1031", "1212"], c: 1, e: "Abderramán III se proclamó califa, rompiendo el vínculo religioso con oriente." },
            { q: "¿Cuál era la época de mayor esplendor de Al-Ándalus?", a: ["Emirato", "Califato", "Taifas", "Reino de Granada"], c: 1, e: "Bajo el califato de Córdoba, Al-Ándalus fue el faro cultural de Europa." },
            { q: "¿Qué sistema social definía a los reinos cristianos del norte?", a: ["Capitalismo", "Feudalismo", "Democracia", "Socialismo"], c: 1, e: "El feudalismo se basaba en el vasallaje, castillos y el control de la tierra." },
            { q: "¿En qué año se convirtió Asturias en el Reino de León?", a: ["722", "816", "914", "1035"], c: 2, e: "El traslado de la capital a León en el 914 consolidó la expansión hacia el Duero." },
            { q: "¿Qué eran las 'Taifas'?", a: ["Ciudades cristianas", "Pequeños reinos musulmanes", "Impuestos", "Ejércitos mercenarios"], c: 1, e: "Eran reinos fragmentados que surgieron tras la caída del Califato en 1031." },
            { q: "¿En qué año cayó definitivamente el Califato de Córdoba?", a: ["929", "1031", "1212", "1492"], c: 1, e: "Las disputas internas llevaron a la abolición del título de califa en el 1031." },
            { q: "¿Qué batalla de 1212 fue crucial para los cristianos?", a: ["Covadonga", "Navas de Tolosa", "Guadalete", "Toro"], c: 1, e: "Las Navas de Tolosa permitió a los cristianos avanzar hacia Andalucía." },
            { q: "¿Qué ciudades conquistaron los cristianos tras 1212?", a: ["Madrid y Toledo", "Sevilla y Córdoba", "Granada y Málaga", "Valencia y Murcia"], c: 1, e: "La victoria en las Navas abrió el valle del Guadalquivir." },
            { q: "¿Cuál fue el último reducto musulmán en la península?", a: ["Sevilla", "Toledo", "Granada", "Córdoba"], c: 2, e: "El Reino Nazarí de Granada sobrevivió hasta 1492." },
            { q: "¿Qué dinastía gobernaba Granada?", a: ["Omeya", "Abasí", "Nazarí", "Almohade"], c: 2, e: "Los nazaríes mantuvieron el esplendor artístico hasta el final de la Reconquista." },
            { q: "¿Qué estilo fusiona arte islámico y cristiano?", a: ["Barroco", "Gótico", "Mudéjar", "Renacimiento"], c: 2, e: "El mudéjar es el arte de los musulmanes que vivían en territorio cristiano." },
            { q: "¿En qué año se casaron Isabel de Castilla y Fernando de Aragón?", a: ["1469", "1492", "1474", "1504"], c: 0, e: "Su matrimonio unió las dos coronas más poderosas de la península." },
            { q: "¿Qué día exacto se conquistó Granada?", a: ["12 Octubre 1492", "2 Enero 1492", "15 Agosto 1492", "24 Diciembre 1492"], c: 1, e: "El 2 de enero los Reyes Católicos recibieron las llaves de la ciudad de manos de Boabdil." },
            { q: "¿Quién financió el viaje de Cristóbal Colón?", a: ["Portugal", "Los Reyes Católicos", "El Papa", "Génova"], c: 1, e: "Isabel y Fernando aceptaron las Capitulaciones de Santa Fe tras la toma de Granada." },
            { q: "¿Qué edad de la historia termina en 1492?", a: ["Edad Antigua", "Edad Media", "Edad Moderna", "Edad Contemporánea"], c: 1, e: "El descubrimiento de América y la caída de Granada cierran la Edad Media." },
            { q: "¿Qué edad de la historia comienza tras 1492?", a: ["Antigua", "Media", "Moderna", "Contemporánea"], c: 2, e: "La Edad Moderna se caracteriza por la expansión global y los imperios oceánicos." },
            { q: "¿En qué año comenzó la Revolución Francesa?", a: ["1492", "1789", "1808", "1914"], c: 1, e: "1789 marca el inicio de la Edad Contemporánea." },
            { q: "¿Qué pueblos germanos entraron junto a los Suevos en 409?", a: ["Francos y Sajones", "Vándalos y Alanos", "Godos y Hunos", "Lombardos"], c: 1, e: "Fueron los tres grupos principales que asolaron la Hispania romana inicial." },
            { q: "¿Qué rey visigodo derrotó a los vándalos antes del 507?", a: ["Eurico", "Alarico", "Wamba", "Egica"], c: 0, e: "Eurico fue uno de los monarcas más poderosos antes de la fijación en Toledo." },
            { q: "¿De qué religión era la mayoría de la población hispanorromana?", a: ["Arriana", "Católica", "Musulmana", "Judía"], c: 1, e: "Por eso la conversión de Recaredo fue un paso político maestro para la estabilidad." },
            { q: "¿Qué significa 'reconquista'?", a: ["Paz comercial", "Proceso de recuperación cristiana", "Invasión de África", "Guerra civil árabe"], c: 1, e: "Es el término para los casi 800 años de avance cristiano hacia el sur." },
            { q: "¿Qué reino nació en 816?", a: ["Castilla", "Aragón", "Portugal", "Pamplona"], c: 3, e: "Navarra/Pamplona fue uno de los núcleos de resistencia pirenaica." },
            { q: "¿Cuál era la base de la economía feudal?", a: ["Minería", "Comercio internacional", "Agricultura y ganadería", "Tecnología"], c: 2, e: "Era una economía cerrada basada en el autoconsumo y la tierra." },
            { q: "¿Qué papel tenían los castillos?", a: ["Casas de recreo", "Defensa y control territorial", "Escuelas", "Mercados"], c: 1, e: "Eran el eje central del poder feudal y la protección contra incursiones." },
            { q: "¿Cómo se llama la independencia total de Córdoba?", a: ["Emirato", "Califato", "Taifa", "Reino"], c: 1, e: "El Califato implica independencia política y también religiosa (liderazgo espiritual)." },
            { q: "¿Quién era el 'Inmigrado'?", a: ["Boabdil", "Abderramán I", "Colón", "Tariq"], c: 1, e: "Apodo de Abderramán I por venir huyendo desde el lejano oriente." },
            { q: "¿Qué lengua trajeron los visigodos?", a: ["Árabe", "Latín (evolucionado)", "Alemán moderno", "Griego"], c: 1, e: "Aunque germánicos, se latinizaron rápidamente adoptando la lengua del imperio." },
            { q: "¿Qué pasaba en las Taifas?", a: ["Paz absoluta", "Guerra constante entre ellas", "Unión contra el norte", "Aislamiento total"], c: 1, e: "Sus disputas las hicieron débiles y tributarias (parias) de los cristianos." },
            { q: "¿Cuál fue el primer hito de 1492?", a: ["Llegada a América", "Toma de Granada", "Muerte de Isabel", "Expulsión de los franceses"], c: 1, e: "Granada cayó en enero; el viaje de Colón no culminó hasta octubre." },
            { q: "¿Dónde desembarcó Colón en octubre de 1492?", a: ["México", "Guanahani (Bahamas)", "Brasil", "Nueva York"], c: 1, e: "Creyó haber llegado a las Indias orientales." },
            { q: "¿Qué imperio terminó formalmente en 476?", a: ["Bizantino", "Romano de Occidente", "Persa", "Carolingio"], c: 1, e: "El de Oriente (Bizancio) duró casi mil años más." },
            { q: "¿Qué arquitectura destaca en los reinos cristianos?", a: ["Rascacielos", "Románico y Gótico", "Art Déco", "Barroco"], c: 1, e: "El románico es el estilo por excelencia de la expansión feudal temprana." },
            { q: "¿Cómo se llama el último rey de Granada?", a: ["Al-Hakam", "Boabdil", "Al-Mutamid", "Averroes"], c: 1, e: "Conocido como 'El Chico', entregó las llaves a los Reyes Católicos." },
            { q: "¿Qué territorio unió Fernando?", a: ["Castilla", "Aragón", "Granada", "Navarra"], c: 1, e: "Fernando era el heredero de la Corona de Aragón." },
            { q: "¿Qué territorio unió Isabel?", a: ["Aragón", "Castilla", "Portugal", "Francia"], c: 1, e: "Isabel ganó la guerra civil por el trono de Castilla." },
            { q: "¿A qué edad pertenece el feudalismo?", a: ["Edad Antigua", "Edad Media", "Edad Moderna", "Prehistoria"], c: 1, e: "Es el sistema sociopolítico clásico del medievo europeo." },
            { q: "¿Cuál fue el motor de la expansión global española?", a: ["1492", "1212", "711", "476"], c: 0, e: "La unión de coronas y el fin de la Reconquista permitieron mirar hacia el océano." }
        ];

        const quiz = {
            current: 0,
            score: 0,

            start() {
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                this.showQuestion();
            },

            showQuestion() {
                const q = questions[this.current];
                document.getElementById('question-text').innerText = q.q;
                document.getElementById('progress-text').innerText = `Pregunta ${this.current + 1} de 50`;
                document.getElementById('progress-bar').style.width = `${((this.current + 1) / 50) * 100}%`;
                
                const container = document.getElementById('options-container');
                container.innerHTML = '';
                document.getElementById('feedback').classList.add('hidden');

                q.a.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-indigo-500 hover:bg-indigo-50 font-medium transition-all text-slate-700';
                    btn.innerText = opt;
                    btn.onclick = () => this.checkAnswer(idx);
                    container.appendChild(btn);
                });
            },

            checkAnswer(idx) {
                const q = questions[this.current];
                const feedback = document.getElementById('feedback');
                const title = document.getElementById('feedback-title');
                const text = document.getElementById('feedback-text');
                const btns = document.querySelectorAll('.option-btn');

                btns.forEach(b => b.disabled = true);

                if (idx === q.c) {
                    this.score++;
                    title.innerText = "¡Correcto!";
                    title.className = "text-green-600 font-bold mb-1";
                    btns[idx].classList.add('bg-green-100', 'border-green-500');
                } else {
                    title.innerText = "Incorrecto";
                    title.className = "text-red-600 font-bold mb-1";
                    btns[idx].classList.add('bg-red-100', 'border-red-500');
                    btns[q.c].classList.add('bg-green-100', 'border-green-500');
                }

                text.innerText = q.e;
                document.getElementById('score-badge').innerText = `Aciertos: ${this.score}`;
                feedback.classList.remove('hidden');
                feedback.className = "mt-6 p-5 rounded-2xl " + (idx === q.c ? "bg-green-50 border border-green-200" : "bg-red-50 border border-red-200");
            },

            next() {
                this.current++;
                if (this.current < questions.length) {
                    this.showQuestion();
                } else {
                    this.showResult();
                }
            },

            showResult() {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = `${this.score}/50`;
                
                let critique = "";
                const percent = (this.score / 50) * 100;

                if (percent >= 90) {
                    critique = "<strong>Nivel: Historiador Real.</strong> Has dominado cada rincón de la crónica. Tu comprensión de las transiciones políticas es excepcional.";
                } else if (percent >= 70) {
                    critique = "<strong>Nivel: Cronista Avanzado.</strong> Tienes una base sólida, pero has patinado en detalles específicos. Revisa los periodos de Al-Ándalus.";
                } else if (percent >= 50) {
                    critique = "<strong>Nivel: Aprendiz de Escribano.</strong> Apruebas, pero por los pelos. Necesitas volver a leer sobre las Taifas y la unión de los Reyes Católicos.";
                } else {
                    critique = "<strong>Nivel: Siervo del Feudo.</strong> Desempeño crítico. No dominas las fechas clave (476, 711, 1492). Estudia de nuevo.";
                }

                document.getElementById('performance-critique').innerHTML = critique;
            }
        };
    </script>
</body>
</html>
